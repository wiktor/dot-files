format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$bun\
$python\
$rust\
$golang\
$fill\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2_000
format = "[$duration](dimmed white)"

[nodejs]
symbol = " "
style = "bold green"

[bun]
symbol = "🍞 "
style = "bold yellow"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold red"

[golang]
symbol = " "
style = "bold cyan"

[fill]
symbol = " "
